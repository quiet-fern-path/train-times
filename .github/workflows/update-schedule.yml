name: Update train schedule

on:
  schedule:
    # Every Monday at 04:00 UTC. GitHub may delay scheduled runs slightly
    # under load — that's fine, this only needs to run roughly weekly.
    - cron: '0 4 * * 1'
  workflow_dispatch:      # lets you trigger a manual run from the Actions tab
    inputs:
      routes:
        description: >-
          Optional comma-separated route ids (from routes.json) to refetch,
          e.g. "rdg-oxf,rdg-mai". Only queries the stations those routes
          need and merges into the existing schedule, leaving other routes
          untouched. Leave blank for the normal full run.
        required: false
        default: ''
  push:
    branches: [main]
    paths:
      - 'routes.json'
      - 'stations.json'   # included for completeness, though this file alone never changes what's fetched

permissions:
  contents: write

# Only one fetch against the RTT API at a time, regardless of which branch
# or trigger (cron, manual dispatch, routes.json push) started it — two runs
# racing the same RTT_TOKEN would share its 750/hour budget unpredictably.
# cancel-in-progress stays false so a queued run waits instead of killing an
# in-flight fetch (which would waste the calls it already made this hour).
concurrency:
  group: rtt-schedule-fetch
  cancel-in-progress: false

jobs:
  update-schedule:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch and commit schedule
        env:
          RTT_TOKEN: ${{ secrets.RTT_TOKEN }}
          ROUTES: ${{ github.event.inputs.routes }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          git config user.name "schedule-bot"
          git config user.email "actions@users.noreply.github.com"

          # Commit data/schedule.json (only if it actually changed) and push.
          # schedule.json is NOT in this workflow's push-trigger paths, so
          # these commits never re-trigger the workflow.
          commit_push() {
            git add data/schedule.json
            git diff --cached --quiet || { git commit -m "$1" && git push; }
          }

          if [ "$EVENT_NAME" = "push" ]; then
            # A routes.json edit (a route added or re-added, e.g. from the
            # in-app builder). Fetch ONLY the routes missing from
            # schedule.json rather than a full ~720-call run. Two phases so a
            # new route is usable within ~2-3 min: a fast 7-day fetch first,
            # then an append-merge backfill of the rest of the 90-day
            # lookahead (days 7-89) that keeps the first week and re-queries
            # no day twice.
            NEW=$(python scripts/fetch_schedule.py --print-missing-routes)
            if [ -z "$NEW" ]; then
              echo "No new routes in routes.json — nothing to fetch."
              exit 0
            fi
            echo "New/re-added routes to fetch: $NEW"
            python scripts/fetch_schedule.py --routes "$NEW" --days 7
            commit_push "Add schedule data for $NEW (first 7 days) ($(date -u +%F))"
            python scripts/fetch_schedule.py --routes "$NEW" --start-day 7 --append
            commit_push "Backfill schedule data for $NEW (days 7-89) ($(date -u +%F))"
          elif [ -n "$ROUTES" ]; then
            # Manual scoped refresh (workflow_dispatch): full 90-day replace of
            # just the named routes.
            python scripts/fetch_schedule.py --routes "$ROUTES"
            commit_push "Update schedule data for $ROUTES ($(date -u +%F))"
          else
            # Cron / manual full run: every route, full overwrite.
            python scripts/fetch_schedule.py
            commit_push "Update schedule data ($(date -u +%F))"
          fi
